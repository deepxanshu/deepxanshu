<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="fragments — writing by Deepanshu Chaudhary.">
    <title>fragments &mdash; Deepanshu Chaudhary</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%231463C6'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.dataset.theme = 'dark';
            }
        })();
    </script>
</head>
<body>
    <div class="balls" aria-hidden="true">
        <span class="ball b1"></span>
        <span class="ball b2"></span>
        <span class="ball b3"></span>
        <span class="ball b4"></span>
        <span class="ball b5"></span>
    </div>

    <button class="glyph-theme mark pill" id="theme-toggle" type="button" aria-pressed="false" data-pill="lights off" aria-label="Switch to dark mode">
        <svg class="sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.4" fill="currentColor"/><g stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="12" y1="2.2" x2="12" y2="5.4"/><line x1="12" y1="18.6" x2="12" y2="21.8"/><line x1="2.2" y1="12" x2="5.4" y2="12"/><line x1="18.6" y1="12" x2="21.8" y2="12"/><line x1="5.1" y1="5.1" x2="7.3" y2="7.3"/><line x1="16.7" y1="16.7" x2="18.9" y2="18.9"/><line x1="5.1" y1="18.9" x2="7.3" y2="16.7"/><line x1="16.7" y1="7.3" x2="18.9" y2="5.1"/></g></svg>
        <svg class="moon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M20.4 13.6A8.5 8.5 0 1 1 10.4 3.6a6.8 6.8 0 0 0 10 10z"/></svg>
    </button>

    <main class="stage stage-writing">
        <div class="hero hero-small">
            <div class="name-wrap">
                <h1 class="name" id="name"><a class="name-link pill" href="index.html" data-pill="home">Deepanshu</a><span class="name-overlay" aria-hidden="true">Deepanshu</span><span class="name-overlay" aria-hidden="true">Deepanshu</span><span class="name-overlay" aria-hidden="true">Deepanshu</span><span class="name-overlay" aria-hidden="true">Deepanshu</span><span class="name-overlay" aria-hidden="true">Deepanshu</span></h1>
            </div>
        </div>

        <section class="writing">
            <h2 class="writing-title">fragments</h2>
            <p class="entry">bring back fun</p>
            <p class="note">still becoming.</p>
        </section>
    </main>

    <button class="glyph glyph-music pill muted" id="music" type="button" data-pill="play something" aria-pressed="false" aria-label="Play background sound">
        <svg viewBox="0 0 24 24" aria-hidden="true"><g fill="currentColor"><circle cx="7.9" cy="17.6" r="2.5"/><circle cx="19.5" cy="15.6" r="2.5"/><rect x="9" y="5.6" width="1.5" height="12"/><rect x="20.5" y="3.4" width="1.5" height="12.2"/><polygon points="9,5.6 22,2.8 22,5.7 9,8.5"/></g><line class="slash" x1="2.5" y1="21.5" x2="21.5" y2="2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>

    <script src="site.js"></script>
</body>
</html>
